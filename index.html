<style>
  :root{
    --sage:#a9c0b4; --sage-d:#7fa08f;
    --lav:#b8b0cc; --lav-d:#8d83a8;
    --ink:#3f3a44; --muted:#8a8590;
    --line:#e4e0e8; --paper:#f7f6f3; --card:#ffffff;
    --ok:#1b8a3a; --ok-bg:#e3f2e8; --bad:#d0473f; --bar:#9b8fb5;
    --shadow:0 2px 10px rgba(63,58,68,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Gowun Dodum',-apple-system,sans-serif;
    background:var(--paper); color:var(--ink);
    max-width:480px; margin:0 auto; padding:0 0 110px;
    line-height:1.5;
  }
  /* ── 헤더 ── */
  .brand{
    background:linear-gradient(135deg,#d8cfe6 0%,#c4d4cc 100%);
    padding:22px 20px 18px; text-align:center;
    border-radius:0 0 22px 22px; box-shadow:var(--shadow);
  }
  .brand .name{
    font-family:'Gowun Batang',serif; font-weight:700;
    font-size:27px; letter-spacing:3px; color:#473f55;
  }
  .brand .sub{ font-family:'Gowun Batang',serif; font-size:14px; color:#5d5568; letter-spacing:4px; margin-top:5px; }
  .title-bar{
    background:var(--card); margin:16px 16px 0; padding:13px 18px;
    border-radius:12px; box-shadow:var(--shadow);
    font-family:'Gowun Batang',serif; font-size:15px; font-weight:700;
    border-left:5px solid var(--lav);
  }
  /* ── 학생정보 카드 ── */
  .card{
    background:var(--card); margin:16px; padding:18px;
    border-radius:14px; box-shadow:var(--shadow);
  }
  .card h3{
    margin:0 0 14px; font-size:15px; font-family:'Gowun Batang',serif;
    display:flex; align-items:center; gap:8px;
  }
  .card h3::before{ content:""; width:8px; height:8px; border-radius:50%; background:var(--sage); }
  label{ display:block; font-size:13px; color:var(--muted); margin:12px 0 5px; }
  input[type=text]{
    width:100%; padding:13px 14px; border:1.5px solid var(--line);
    border-radius:10px; font-size:16px; font-family:inherit; background:#fafafb;
    transition:border-color .15s;
  }
  input[type=text]:focus{ outline:none; border-color:var(--lav); background:#fff; }
  /* 응시일 드롭다운 */
  .date-row{ display:flex; align-items:center; gap:8px; margin-top:6px; }
  .sel{
    flex:1; padding:13px 12px; border:1.5px solid var(--line); border-radius:10px;
    font-size:16px; font-family:inherit; background:#fafafb; color:var(--ink);
    -webkit-appearance:none; appearance:none; text-align:center;
  }
  .sel:focus{ outline:none; border-color:var(--lav); background:#fff; }
  .date-row .unit{ font-size:14px; color:var(--muted); }
  /* 선택과목 토글 */
  .subj{ display:flex; gap:10px; margin-top:6px; }
  .subj button{
    flex:1; padding:14px 8px; border:1.5px solid var(--line); background:#fafafb;
    border-radius:10px; font-size:15px; font-family:inherit; color:var(--muted);
    cursor:pointer; transition:all .15s; font-weight:700;
  }
  .subj button.on{
    background:var(--lav); border-color:var(--lav); color:#fff;
    box-shadow:0 3px 8px rgba(141,131,168,.35);
  }
  /* ── 진행률 ── */
  .progress-wrap{
    position:sticky; top:0; z-index:20; background:var(--paper);
    padding:10px 16px 8px; backdrop-filter:blur(4px);
  }
  .progress-info{ display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .progress-info b{ color:var(--lav-d); font-size:14px; }
  .bar{ height:7px; background:var(--line); border-radius:99px; overflow:hidden; }
  .bar > i{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--sage),var(--lav)); transition:width .3s; }
  /* ── 문항 섹션 ── */
  .sec-label{
    margin:18px 16px 4px; font-size:12px; letter-spacing:2px; color:var(--lav-d);
    font-weight:700; display:flex; align-items:center; gap:8px;
  }
  .sec-label span{ flex:1; height:1px; background:var(--line); }
  .q{
    background:var(--card); margin:8px 16px; padding:12px 14px;
    border-radius:13px; box-shadow:var(--shadow);
    display:flex; align-items:center; gap:10px;
    transition:box-shadow .15s;
  }
  .q.answered{ box-shadow:0 0 0 1.5px var(--sage) inset, var(--shadow); }
  .q .num{
    width:30px; flex-shrink:0; text-align:center;
    font-family:'Gowun Batang',serif; font-weight:700; font-size:16px; color:var(--ink);
  }
  .choices{ display:flex; gap:7px; flex:1; }
  .choices button{
    flex:1; aspect-ratio:1; min-width:0; border:1.5px solid var(--line);
    background:#fff; border-radius:50%; font-size:15px; color:var(--muted);
    font-family:'Gowun Batang',serif; cursor:pointer; transition:all .12s;
  }
  .choices button:active{ transform:scale(.9); }
  .choices button.sel{
    background:var(--sage-d); border-color:var(--sage-d); color:#fff; font-weight:700;
    box-shadow:0 2px 6px rgba(127,160,143,.4);
  }
  /* ── 하단 제출 바 ── */
  .footer{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px; padding:12px 16px 22px;
    background:linear-gradient(to top,var(--paper) 70%,transparent);
  }
  #submit{
    width:100%; padding:17px; border:none; border-radius:13px;
    background:var(--lav-d); color:#fff; font-size:17px; font-weight:700;
    font-family:'Gowun Batang',serif; cursor:pointer; letter-spacing:2px;
    box-shadow:0 4px 14px rgba(141,131,168,.4); transition:opacity .15s;
  }
  #submit:active{ opacity:.85; }
  #submit:disabled{ background:var(--muted); box-shadow:none; }
  /* ── 완료 화면 ── */
  .done{
    display:none; text-align:center; padding:70px 30px;
  }
  .done .check{
    width:84px; height:84px; margin:0 auto 22px; border-radius:50%;
    background:var(--ok-bg); display:flex; align-items:center; justify-content:center;
    font-size:42px; color:var(--ok);
  }
  .done h2{ font-family:'Gowun Batang',serif; margin:0 0 8px; }
  .done p{ color:var(--muted); font-size:14px; }
  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 20px; border-radius:99px;
    font-size:13px; opacity:0; transition:all .25s; pointer-events:none; z-index:50; white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ───── 성적표 영역 ───── */
  #report{ display:none; }
  #report .rbrand{ background:linear-gradient(135deg,#d8cfe6 0%,#c4d4cc 100%);
    padding:22px; display:flex; align-items:center; justify-content:space-between;
    border-radius:0 0 22px 22px; box-shadow:var(--shadow); }
  #report .rbrand .name{ font-family:'Gowun Batang',serif; font-weight:700; font-size:24px; letter-spacing:2px; color:#473f55; }
  #report .rbrand .sub{ font-family:'Gowun Batang',serif; font-size:13px; color:#5d5568; letter-spacing:2px; margin-top:4px; }
  #report .rbrand .logo{ width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.55);
    display:flex;align-items:center;justify-content:center;font-family:'Gowun Batang',serif;font-size:11px;color:#6b6280; }
  #report .tbar{ background:#e8e3f0; margin:16px; padding:11px 18px; border-radius:10px;
    font-family:'Gowun Batang',serif; font-size:15px; font-weight:700; color:#4a4356; text-align:center; }
  #report section{ margin:16px; }
  #report h2{ font-family:'Gowun Batang',serif; font-size:16px; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
  #report h2::before{ content:""; width:9px;height:9px;border-radius:2px;background:var(--lav); }
  #report table{ width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:var(--shadow); }
  #report th,#report td{ padding:11px 8px; text-align:center; font-size:14px; }
  #report .info th{ background:#cdd9e0; color:#3c4a52; font-weight:700; }
  #report .info td{ background:#efeef1; }
  #report .score th{ background:#cdd9e0; color:#3c4a52; }
  #report .score td{ background:#efeef1; font-size:15px; }
  #report .score .big{ font-family:'Gowun Batang',serif; font-size:22px; font-weight:700; color:var(--lav-d); }
  #report table.areatbl th{ background:#dcd5e6; color:#473f55; font-size:13px; padding:9px 6px; }
  #report table.areatbl td{ padding:9px 6px; font-size:13.5px; border-bottom:1px solid var(--line); white-space:nowrap; }
  #report table.areatbl td.areaname{ text-align:left; padding-left:14px; }
  #report table.areatbl .cat{ color:var(--muted); font-size:12px; font-weight:700; }
  #report table.areatbl .hit{ color:var(--lav-d); font-weight:700; }
  #report table.areatbl tr.total td{ background:#efeef1; font-weight:700; }
  #report .chart{ background:#fff; border-radius:10px; box-shadow:var(--shadow); padding:14px 10px 8px; margin-top:14px; }
  #report .grid-wrap{ overflow-x:auto; background:#fff; border-radius:10px; box-shadow:var(--shadow); padding:4px; }
  #report table.scoretbl{ min-width:480px; }
  #report table.scoretbl th,#report table.scoretbl td{ padding:7px 5px; font-size:12.5px; border:1px solid #eee; }
  #report .rowlabel{ background:#dcd5e6; color:#473f55; font-weight:700; white-space:nowrap; font-size:12px; }
  #report .qn{ background:#e8e3f0; font-weight:700; color:#4a4356; }
  #report td.o{ color:var(--ok); font-weight:700; }
  #report td.x{ color:var(--bad); font-weight:700; background:#fcebea; }
  #report .legend{ font-size:12px; color:var(--muted); margin-top:8px; text-align:right; }
</style>
</head>
<body>

<div id="main">
  <!-- 헤더 -->
  <div class="brand">
    <div class="name">이수경국어</div>
    <div class="sub">Shueguk</div>
  </div>
  <div class="title-bar">2026 주간 모의고사 · OMR 답안 입력</div>

  <!-- 학생정보 -->
  <div class="card">
    <h3>학생 정보</h3>
    <label>응시 회차</label>
    <select id="exam" class="sel" style="width:100%;">
      <option value="">회차를 선택하세요</option>
    </select>
    <label>응시일</label>
    <div class="date-row">
      <select id="mon" class="sel"></select>
      <span class="unit">월</span>
      <select id="day" class="sel"></select>
      <span class="unit">일</span>
    </div>
    <label>이름</label>
    <input type="text" id="name" placeholder="이름" autocomplete="off">
    <label>학교</label>
    <input type="text" id="school" placeholder="학교명" autocomplete="off">
    <label>학년</label>
    <div class="subj">
      <button type="button" data-grade="1" onclick="pickGrade(this)">1학년</button>
      <button type="button" data-grade="2" onclick="pickGrade(this)">2학년</button>
      <button type="button" data-grade="3" onclick="pickGrade(this)">3학년</button>
    </div>
    <label>선택과목</label>
    <div class="subj">
      <button type="button" data-subj="화법과작문" onclick="pickSubj(this)">화법과작문</button>
      <button type="button" data-subj="언어와매체" onclick="pickSubj(this)">언어와매체</button>
    </div>
  </div>

  <!-- 진행률 -->
  <div class="progress-wrap">
    <div class="progress-info"><span>답안 작성 현황</span><span><b id="cnt">0</b> / 45</span></div>
    <div class="bar"><i id="barFill"></i></div>
  </div>

  <!-- 문항 영역 (스크립트가 영역별로 자동 생성) -->
  <div id="quiz"></div>
</div>

<!-- 완료 화면 -->
<div class="done" id="done">
  <div class="check">✓</div>
  <h2>제출이 완료되었습니다</h2>
  <p id="doneMsg"></p>
</div>

<!-- 제출 바 -->
<div class="footer" id="footer">
  <button id="submit" onclick="submit()">답안 제출하기</button>
</div>

<!-- 성적표 -->
<div id="report"></div>

<div class="toast" id="toast"></div>

<script>
  // ▼▼▼ [중요] 배포 후 받은 Apps Script 웹앱 주소를 아래 따옴표 안에 붙여넣으세요 ▼▼▼
  const API_URL = "https://script.google.com/macros/s/AKfycbyUHMdCH_u35Oeu6lEmx3yOYscoKLwEB8TC0QHGBOaCXZ4rbAnkMpP9_Na4l3QLOajGPA/exec";
  // ▲▲▲ 예: https://script.google.com/macros/s/AKfy.../exec ▲▲▲

  // 서버에서 데이터 가져오기 (GET)
  async function apiGet(params){
    const url = API_URL + (API_URL.includes('?') ? '&' : '?') + params;
    const r = await fetch(url);
    return await r.json();
  }
  // 서버로 제출하기 (POST) — CORS 회피를 위해 text/plain 본문 사용
  async function apiPost(obj){
    const r = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(obj)
    });
    return await r.json();
  }
  function apiReady(){ return API_URL && API_URL.indexOf('script.google.com') !== -1; }

  const TOTAL = 45;
  // 영역 구분 (성적표 큰 분류와 일치)
  const SECTIONS = [
    { name:'독서론',  from:1,  to:3  },
    { name:'독서',    from:4,  to:17 },
    { name:'문학',    from:18, to:34 },
    { name:'선택과목', from:35, to:45, select:true }
  ];
  const picks = {};
  let subject = null;
  let grade = null;

  // 응시일 드롭다운 채우기 (월 1~12, 일 1~31)
  (function fillDate(){
    const mon=document.getElementById('mon'), day=document.getElementById('day');
    const now=new Date();
    for(let m=1;m<=12;m++){ const o=document.createElement('option'); o.value=m; o.textContent=m; if(m===now.getMonth()+1)o.selected=true; mon.appendChild(o); }
    for(let d=1;d<=31;d++){ const o=document.createElement('option'); o.value=d; o.textContent=d; if(d===now.getDate())o.selected=true; day.appendChild(o); }
  })();

  // 회차 목록 불러오기 (스프레드시트에서 자동)
  function fillExamList(names){
    const sel=document.getElementById('exam');
    sel.innerHTML='<option value="">회차를 선택하세요</option>';
    names.forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
  }
  (function loadExams(){
    if(apiReady()){
      apiGet('action=examList')
        .then(res=>{
          if(res && res.ok && Array.isArray(res.list)) fillExamList(res.list);
          else toast('회차 목록을 불러오지 못했습니다');
        })
        .catch(()=>toast('회차 목록을 불러오지 못했습니다'));
    }else{
      // 주소 미입력(로컬 데모): 임시 목록
      fillExamList(['상상3-4회차','상상3-5회차']);
    }
  })();

  // 문항 한 개 생성
  function makeQ(i){
    const q = document.createElement('div');
    q.className='q'; q.id='q'+i;
    q.innerHTML = `<span class="num">${i}</span><div class="choices"></div>`;
    const ch = q.querySelector('.choices');
    for(let j=1;j<=5;j++){
      const b=document.createElement('button');
      b.textContent=j;
      b.onclick=()=>choose(i,j,ch,q);
      ch.appendChild(b);
    }
    return q;
  }

  // 영역별 섹션 렌더링
  function buildQuiz(){
    const quiz=document.getElementById('quiz');
    SECTIONS.forEach(sec=>{
      const label=document.createElement('div');
      label.className='sec-label';
      if(sec.select){
        label.innerHTML=`선택 · <span id="subjLabel" style="flex:0;color:var(--lav-d)">과목 미선택</span> ${sec.from}–${sec.to}<span></span>`;
      }else{
        label.innerHTML=`${sec.name} ${sec.from}–${sec.to}<span></span>`;
      }
      quiz.appendChild(label);
      for(let i=sec.from;i<=sec.to;i++) quiz.appendChild(makeQ(i));
    });
  }
  buildQuiz();

  function choose(i,j,ch,q){
    picks[i]=j;
    ch.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));
    ch.children[j-1].classList.add('sel');
    q.classList.add('answered');
    updateProgress();
  }

  function updateProgress(){
    const n=Object.keys(picks).length;
    document.getElementById('cnt').textContent=n;
    document.getElementById('barFill').style.width=(n/TOTAL*100)+'%';
  }

  function pickSubj(btn){
    subject=btn.dataset.subj;
    btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const lbl=document.getElementById('subjLabel'); if(lbl) lbl.textContent=subject;
  }

  function pickGrade(btn){
    grade=btn.dataset.grade;
    btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  }

  function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
  }

  function submit(){
    const name=document.getElementById('name').value.trim();
    const school=document.getElementById('school').value.trim();
    const examName=document.getElementById('exam').value;
    const mon=document.getElementById('mon').value;
    const day=document.getElementById('day').value;
    if(!examName){ toast('응시 회차를 선택해 주세요'); window.scrollTo({top:0,behavior:'smooth'}); return; }
    if(!name){ toast('이름을 입력해 주세요'); document.getElementById('name').focus(); return; }
    if(!school){ toast('학교를 입력해 주세요'); document.getElementById('school').focus(); return; }
    if(!grade){ toast('학년을 선택해 주세요'); window.scrollTo({top:0,behavior:'smooth'}); return; }
    if(!subject){ toast('선택과목을 골라 주세요'); window.scrollTo({top:0,behavior:'smooth'}); return; }

    const missing=[];
    for(let i=1;i<=TOTAL;i++) if(!picks[i]) missing.push(i);
    if(missing.length){
      if(!confirm(`미응답 ${missing.length}문항이 있습니다 (${missing.slice(0,5).join(', ')}${missing.length>5?'...':''}).\n그대로 제출할까요?`)) return;
    }

    const payload={
      examName, name, school, grade, subject,
      examDate: `${mon}월 ${day}일`,
      examMonth: Number(mon), examDay: Number(day),
      answers: picks,
      submittedAt: new Date().toISOString()
    };

    const btn=document.getElementById('submit');
    btn.disabled=true; btn.textContent='채점 중...';

    if(apiReady()){
      // 서버가 채점·저장 후 성적표 데이터(객체)를 돌려줌
      apiPost({ action:'submit', payload: payload })
        .then(function(res){
          if(res && res.ok){ onDone(res); }
          else{ btn.disabled=false; btn.textContent='답안 제출하기'; toast('채점 오류: ' + (res&&res.error?res.error:'알 수 없음')); }
        })
        .catch(function(e){ btn.disabled=false; btn.textContent='답안 제출하기'; toast('제출 실패: 다시 시도해 주세요'); });
    }else{
      // 주소 미입력(로컬 데모): 서버 없이 완료 화면만
      console.log('제출 payload:', payload);
      setTimeout(()=>onDone({ student:payload, result:null }), 600);
    }
  }

  function onDone(res){
    document.getElementById('main').style.display='none';
    document.getElementById('footer').style.display='none';
    if(res && res.result){
      renderReport(res);          // 서버 채점 결과 → 성적표
    }else{
      // 데모(로컬): 결과가 없으면 완료 메시지만
      const p=res.student||res;
      document.getElementById('done').style.display='block';
      document.getElementById('doneMsg').textContent=
        `${p.name} · ${p.school} ${p.grade}학년 · ${p.subject} · ${p.examName||''} · ${p.examDate} 응시 제출 완료 (데모: 서버 연동 시 성적표 표시)`;
      window.scrollTo(0,0);
    }
  }

  /* ─── 성적표 렌더링 (서버가 준 결과 res를 그림) ─── */
  function renderReport(res){
    const st=res.student, exam=res.exam, r=res.result;
    const catCount={}; r.areas.forEach(a=>catCount[a.cat]=(catCount[a.cat]||0)+1);
    const catSeen={}; let areaRows='';
    r.areas.forEach(a=>{
      const first=!catSeen[a.cat]; catSeen[a.cat]=true;
      areaRows+=`<tr>${first?`<td class="cat" rowspan="${catCount[a.cat]}">${a.cat}</td>`:''}
        <td class="areaname">${a.name}</td><td>${a.full}</td><td class="hit">${a.score}</td><td>${a.rate}</td></tr>`;
    });
    function block(s,e){
      let qn='<tr><td class="rowlabel">문항</td>',an='<tr><td class="rowlabel">정답</td>',
          my='<tr><td class="rowlabel">학생답안</td>',ox='<tr><td class="rowlabel">정오</td>';
      for(let q=s;q<=e;q++){ const d=r.detail[q];
        qn+=`<td class="qn">${q}</td>`; an+=`<td>${d.ans}</td>`;
        my+=`<td class="${d.ok?'':'x'}">${d.mine}</td>`;
        ox+=`<td class="${d.ok?'o':'x'}">${d.ok?d.pt:0}</td>`; }
      return `<table class="scoretbl">${qn}</tr>${an}</tr>${my}</tr>${ox}</tr></table>`;
    }
    const PLOT=160;
    const bars=r.areas.map(a=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px;">${a.rate}</div>
      <div style="width:58%;height:${a.rate/100*PLOT}px;background:var(--bar);border-radius:3px 3px 0 0;"></div></div>`).join('');
    const labels=r.areas.map(a=>`<div style="flex:1;text-align:center;font-size:10.5px;color:var(--ink);line-height:1.2;word-break:keep-all;padding:0 2px;">${a.name}</div>`).join('');
    const chart=`<div style="display:flex;align-items:flex-end;gap:4px;height:${PLOT+20}px;border-bottom:1.5px solid var(--line);padding:0 6px;">${bars}</div>
      <div style="display:flex;gap:4px;padding:7px 6px 0;">${labels}</div>`;

    document.getElementById('report').innerHTML=`
      <div class="rbrand"><div><div class="name">이수경국어</div><div class="sub">Shueguk</div></div><div class="logo">Shueguk</div></div>
      <div class="tbar">2026 주간 모의고사 성적표 · ${exam.code}</div>
      <section><h2>1. 학생정보</h2>
        <table class="info"><tr><th>성명</th><th>학교</th><th>학년</th><th>선택과목</th><th>응시일</th></tr>
        <tr><td>${st.name}</td><td>${st.school}</td><td>${st.grade}</td><td>${exam.subject}</td><td>${st.examDate}</td></tr></table></section>
      <section><h2>2. 성적</h2>
        <table class="score"><tr><th>점수(100점 만점)</th><th>등급</th><th>등급컷</th></tr>
        <tr><td class="big">${r.got}</td><td class="big">${r.grade}</td><td>${exam.cuts.join('-')}</td></tr></table></section>
      <section><h2>3. 영역분류별 성취도 분석</h2>
        <table class="areatbl"><tr><th>분류</th><th>영역</th><th>배점</th><th>득점</th><th>성취도(%)</th></tr>
        ${areaRows}
        <tr class="total"><td colspan="2">합계</td><td>${r.total}</td><td>${r.got}</td><td>${Math.round(r.got/r.total*100)}</td></tr></table>
        <div class="chart">${chart}</div></section>
      <section><h2>4. 문항 채점표</h2>
        <div class="grid-wrap">${block(1,15)}${block(16,30)}${block(31,45)}</div>
        <div class="legend">정오 칸의 숫자 = 획득 배점 · 0 = 오답</div></section>`;
    document.getElementById('report').style.display='block';
    window.scrollTo(0,0);
  }
</script>
</body>
</html>
