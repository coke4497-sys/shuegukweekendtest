<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이수경국어 · 성적 관리</title>
<!-- ※ Apps Script 프로젝트의 'teacher' 파일 원본입니다.
     수정 시 이 파일을 고친 뒤 Apps Script의 teacher.html에 통째로 붙여넣고 재배포하세요.
     (2026-07: 제출 행 삭제 버튼 + 같은 학생·같은 회차 중복 제출 '중복' 표시 추가) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --sage:#a9c0b4; --sage-d:#7fa08f;
    --lav:#b8b0cc; --lav-d:#8d83a8; --lav-bg:#e8e3f0;
    --ink:#3f3a44; --muted:#8a8590;
    --line:#e4e0e8; --paper:#f7f6f3; --card:#ffffff;
    --head:#cdd9e0; --head2:#dcd5e6;
    --ok:#1b8a3a; --ok-bg:#e3f2e8; --bad:#d0473f; --bar:#9b8fb5;
    --shadow:0 2px 12px rgba(63,58,68,.07);
  }
  *{box-sizing:border-box;}
  body{ font-family:'Gowun Dodum',-apple-system,sans-serif; background:var(--paper); color:var(--ink);
    max-width:760px; margin:0 auto; padding:0 0 50px; line-height:1.5; }
  .brand{ background:linear-gradient(135deg,#d8cfe6 0%,#c4d4cc 100%);
    padding:20px 24px 16px; border-radius:0 0 22px 22px; box-shadow:var(--shadow);
    display:flex; align-items:baseline; gap:12px; }
  .brand .name{ font-family:'Gowun Batang',serif; font-weight:700; font-size:24px; letter-spacing:2px; color:#473f55; }
  .brand .sub{ font-family:'Gowun Batang',serif; font-size:13px; color:#5d5568; letter-spacing:2px; }
  .title-bar{ background:var(--lav-bg); margin:16px; padding:11px 18px; border-radius:10px;
    font-family:'Gowun Batang',serif; font-size:15px; font-weight:700; color:#4a4356; text-align:center; }

  /* 필터바 */
  .filter{ margin:16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .filter input, .filter select{ padding:10px 12px; border:1.5px solid var(--line); border-radius:9px;
    font-size:14px; font-family:inherit; background:#fff; }
  .filter input{ flex:1; min-width:140px; }
  .filter button{ padding:10px 16px; border:none; border-radius:9px; background:var(--lav-d); color:#fff;
    font-family:'Gowun Batang',serif; font-weight:700; font-size:14px; cursor:pointer; }

  /* 목록 테이블 */
  .list-wrap{ margin:16px; background:var(--card); border-radius:12px; box-shadow:var(--shadow); overflow-x:auto; }
  table.list{ width:100%; border-collapse:collapse; }
  table.list th{ background:var(--head2); color:#473f55; font-size:13px; padding:11px 8px; white-space:nowrap; }
  table.list td{ padding:11px 8px; font-size:13.5px; text-align:center; border-bottom:1px solid var(--line); white-space:nowrap; }
  table.list tr.r{ cursor:pointer; }
  table.list tr.r:hover{ background:var(--lav-bg); }
  table.list .nm{ font-weight:700; color:var(--ink); }
  table.list .sc{ color:var(--lav-d); font-weight:700; }
  .empty{ padding:40px; text-align:center; color:var(--muted); font-size:14px; }
  .loading{ padding:30px; text-align:center; color:var(--muted); }

  /* 중복 제출 표시 + 삭제 버튼 */
  .dup{ display:inline-block; font-size:11px; font-weight:700; background:#fcebea; color:var(--bad);
    border-radius:20px; padding:1px 8px; margin-left:5px; vertical-align:1px; }
  table.list td.delc{ padding:6px 8px; }
  .del-btn{ border:1.5px solid var(--line); background:#fff; color:var(--bad); font-family:inherit;
    font-size:12px; font-weight:700; padding:5px 11px; border-radius:8px; cursor:pointer; }
  .del-btn:hover{ background:#fcebea; border-color:#e8b6b2; }
  .del-btn:disabled{ opacity:.5; cursor:default; }

  /* 성적표 (학생용과 동일) */
  #report{ display:none; margin-top:8px; }
  #report .back{ margin:16px; }
  #report .back button{ padding:9px 16px; border:1.5px solid var(--lav); background:#fff; color:var(--lav-d);
    border-radius:9px; font-family:'Gowun Batang',serif; font-weight:700; cursor:pointer; font-size:14px; }
  #report .rbrand{ background:linear-gradient(135deg,#d8cfe6 0%,#c4d4cc 100%);
    padding:22px; display:flex; align-items:center; justify-content:space-between; border-radius:14px; box-shadow:var(--shadow); margin:16px; }
  #report .rbrand .name{ font-family:'Gowun Batang',serif; font-weight:700; font-size:24px; letter-spacing:2px; color:#473f55; }
  #report .rbrand .sub{ font-family:'Gowun Batang',serif; font-size:13px; color:#5d5568; letter-spacing:2px; margin-top:4px; }
  #report .rbrand .logo{ width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.55);
    display:flex;align-items:center;justify-content:center;font-family:'Gowun Batang',serif;font-size:11px;color:#6b6280; }
  #report .tbar{ background:#e8e3f0; margin:16px; padding:11px 18px; border-radius:10px;
    font-family:'Gowun Batang',serif; font-size:15px; font-weight:700; color:#4a4356; text-align:center; }
  #report section{ margin:16px; }
  #report h2{ font-family:'Gowun Batang',serif; font-size:16px; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
  #report h2::before{ content:""; width:9px;height:9px;border-radius:2px;background:var(--lav); }
  #report table.rt{ width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:var(--shadow); }
  #report table.rt th,#report table.rt td{ padding:11px 8px; text-align:center; font-size:14px; }
  #report .info th{ background:#cdd9e0; color:#3c4a52; font-weight:700; }
  #report .info td{ background:#efeef1; }
  #report .score th{ background:#cdd9e0; color:#3c4a52; }
  #report .score td{ background:#efeef1; font-size:15px; }
  #report .score .big{ font-family:'Gowun Batang',serif; font-size:22px; font-weight:700; color:var(--lav-d); }
  #report table.areatbl th{ background:#dcd5e6; color:#473f55; font-size:13px; padding:9px 6px; }
  #report table.areatbl td{ padding:9px 6px; font-size:13.5px; border-bottom:1px solid var(--line); white-space:nowrap; }
  #report table.areatbl td.areaname{ text-align:left; padding-left:14px; }
  #report table.areatbl .cat{ color:var(--muted); font-size:12px; font-weight:700; }
  #report table.areatbl .hit{ color:var(--lav-d); font-weight:700; }
  #report table.areatbl tr.total td{ background:#efeef1; font-weight:700; }
  #report .chart{ background:#fff; border-radius:10px; box-shadow:var(--shadow); padding:14px 10px 8px; margin-top:14px; }
  #report .grid-wrap{ overflow-x:auto; background:#fff; border-radius:10px; box-shadow:var(--shadow); padding:4px; }
  #report table.scoretbl{ min-width:480px; border-collapse:collapse; }
  #report table.scoretbl th,#report table.scoretbl td{ padding:7px 5px; font-size:12.5px; border:1px solid #eee; text-align:center; }
  #report .rowlabel{ background:#dcd5e6; color:#473f55; font-weight:700; white-space:nowrap; font-size:12px; }
  #report .qn{ background:#e8e3f0; font-weight:700; color:#4a4356; }
  #report td.o{ color:var(--ok); font-weight:700; }
  #report td.x{ color:var(--bad); font-weight:700; background:#fcebea; }
  #report .legend{ font-size:12px; color:var(--muted); margin-top:8px; text-align:right; }
  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 22px; border-radius:99px; font-size:13px;
    opacity:0; transition:all .25s; pointer-events:none; z-index:50; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="brand">
  <span class="name">이수경국어</span><span class="sub">Shueguk · 성적 관리</span>
</div>
<div class="title-bar">제출된 답안 · 성적표 조회</div>

<!-- 목록 화면 -->
<div id="listView">
  <div class="filter">
    <input type="text" id="q" placeholder="이름·학교 검색" oninput="applyFilter()">
    <select id="fExam" onchange="applyFilter()"><option value="">전체 회차</option></select>
    <button onclick="reload()">새로고침</button>
  </div>
  <div class="list-wrap">
    <div class="loading" id="loading">불러오는 중…</div>
    <table class="list" id="listTbl" style="display:none;">
      <thead><tr><th>응시일</th><th>회차</th><th>이름</th><th>학교</th><th>학년</th><th>과목</th><th>점수</th><th>등급</th><th>삭제</th></tr></thead>
      <tbody id="listBody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">제출된 답안이 없습니다.</div>
  </div>
</div>

<!-- 성적표 화면 -->
<div id="report"></div>

<div class="toast" id="toast"></div>

<script>
  let ALL=[];    // 전체 응답 목록
  let VIEW=[];   // 현재 필터로 표시 중인 목록 (삭제 버튼 인덱스용)
  const SERVER_PW='sh';

  function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

  // 진단 메시지 표시 안 함 (운영용)
  function diag(msg){ /* no-op */ }

  // 응시일을 한국 시간 기준 'M월 d일'로 간결하게
  function fmtDate(v){
    if(!v) return '';
    if(/[월일]/.test(v)) return v;                 // 이미 'M월 d일' 형식이면 그대로
    const d = new Date(v);
    if(isNaN(d.getTime())) return v;               // 날짜로 못 읽으면 원본 그대로
    return d.toLocaleDateString('ko-KR', { timeZone:'Asia/Seoul', month:'long', day:'numeric' });
  }

  // 제출시각을 한국 시간 기준 'M월 d일 H시 m분'으로
  function fmtDateTime(v){
    if(!v) return '';
    const d = new Date(v);
    if(isNaN(d.getTime())) return v;
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone:'Asia/Seoul', month:'numeric', day:'numeric',
      hour:'numeric', minute:'2-digit', hour12:false
    }).formatToParts(d);
    const get = t => (parts.find(p=>p.type===t)||{}).value || '';
    return `${get('month')}월 ${get('day')}일 ${get('hour')}시 ${get('minute')}분`;
  }

  // 목록 불러오기
  function reload(){
    document.getElementById('loading').style.display='block';
    document.getElementById('listTbl').style.display='none';
    document.getElementById('empty').style.display='none';

    const hasGoogle = !!(window.google && google.script && google.script.run);

    if(hasGoogle){
      google.script.run
        .withSuccessHandler(function(res){
          if(res && res.ok){
            onList(res.list || []);
          }else{
            toast('목록 오류: ' + (res && res.error ? res.error : '알 수 없음'));
            document.getElementById('loading').style.display='none';
          }
        })
        .withFailureHandler(function(e){
          toast('서버 통신 오류: ' + (e && e.message ? e.message : e));
          document.getElementById('loading').style.display='none';
        })
        .getResponses();
    }else{
      toast('이 화면은 웹앱(script.google.com)에서 열어야 합니다.');
      onList([
        {row:2,examDate:'5월 28일',examName:'상상3-4회차',name:'최유진',school:'상상고',grade:'3',subject:'언어와매체',got:95,gradeLevel:'1'},
        {row:3,examDate:'5월 28일',examName:'상상3-4회차',name:'박지호',school:'상상고',grade:'3',subject:'화법과작문',got:88,gradeLevel:'2'},
      ]);
    }
  }
  function onList(list){
    ALL=list||[];
    const exams=[...new Set(ALL.map(r=>r.examName))];
    const sel=document.getElementById('fExam');
    sel.innerHTML='<option value="">전체 회차</option>'+exams.map(e=>`<option value="${e}">${e}</option>`).join('');
    document.getElementById('loading').style.display='none';
    applyFilter();
  }
  function applyFilter(){
    const q=document.getElementById('q').value.trim();
    const ex=document.getElementById('fExam').value;
    let rows=ALL.filter(r=>(!ex||r.examName===ex)&&(!q||(r.name||'').includes(q)||(r.school||'').includes(q)));
    const tbl=document.getElementById('listTbl'), body=document.getElementById('listBody'), empty=document.getElementById('empty');
    if(!rows.length){ tbl.style.display='none'; empty.style.display='block'; VIEW=[]; return; }
    empty.style.display='none'; tbl.style.display='table';
    VIEW=rows;
    // 같은 학생(이름+학교)·같은 회차의 제출이 2건 이상이면 '중복' 표시
    const dup={};
    ALL.forEach(r=>{ const k=(r.name||'')+'|'+(r.school||'')+'|'+(r.examName||''); dup[k]=(dup[k]||0)+1; });
    body.innerHTML=rows.map((r,i)=>{
      const k=(r.name||'')+'|'+(r.school||'')+'|'+(r.examName||'');
      const dupTag = dup[k]>1 ? '<span class="dup">중복</span>' : '';
      return `<tr class="r" onclick="openReport(${r.row})">
      <td>${fmtDateTime(r.submittedAt)}</td><td>${r.examName||''}</td><td class="nm">${r.name||''}${dupTag}</td>
      <td>${r.school||''}</td><td>${r.grade||''}</td><td>${r.subject||''}</td>
      <td class="sc">${r.got}</td><td>${r.gradeLevel||''}</td>
      <td class="delc"><button type="button" class="del-btn" onclick="delRow(event,${i})">삭제</button></td></tr>`;
    }).join('');
  }

  // 제출 삭제 (중복 제출 정리) — 행 번호 + 이름·제출시각을 대조해 안전하게 삭제
  function delRow(ev,i){
    ev.stopPropagation();   // 행 클릭(성적표 열기)로 번지지 않게
    const r=VIEW[i]; if(!r) return;
    if(!confirm(`${r.name} · ${r.examName} · ${fmtDateTime(r.submittedAt)} 제출을 삭제할까요?\n시트에서 해당 행이 지워지며 되돌릴 수 없어요.`)) return;
    const btn=ev.target; btn.disabled=true; btn.textContent='삭제 중…';
    if(!(window.google && google.script && google.script.run)){
      toast('웹앱(script.google.com)에서만 삭제할 수 있습니다');
      btn.disabled=false; btn.textContent='삭제'; return;
    }
    google.script.run
      .withSuccessHandler(function(res){
        if(res && res.result==='success'){ toast('삭제했습니다'); reload(); }
        else if(res && res.message==='stale'){ toast('목록이 최신이 아니에요 — 새로 불러옵니다'); reload(); }
        else{ toast('삭제 실패: '+((res&&res.message)||'알 수 없음')); btn.disabled=false; btn.textContent='삭제'; }
      })
      .withFailureHandler(function(e){
        toast('삭제 실패: '+(e&&e.message?e.message:e));
        btn.disabled=false; btn.textContent='삭제';
      })
      .deleteResponseRun(SERVER_PW, r.row, r.name, String(r.submittedAt||''));
  }

  // 성적표 열기
  function openReport(row){
    if(window.google && google.script && google.script.run){
      toast('성적표 불러오는 중…');
      google.script.run
        .withSuccessHandler(function(jsonStr){
          let res;
          try{ res = JSON.parse(jsonStr); }
          catch(e){ toast('성적표 데이터 오류'); return; }
          if(res && res.ok){ renderReport(res); }
          else{ toast('성적표 오류: ' + (res && res.error ? res.error : '알 수 없음')); }
        })
        .withFailureHandler(function(e){ toast('성적표를 불러오지 못했습니다: ' + (e&&e.message?e.message:e)); })
        .getReportByRow(row);
    }else{
      toast('데모 환경에서는 성적표 조회가 제한됩니다');
    }
  }

  /* ─── 성적표 렌더링 (학생용과 동일) ─── */
  function renderReport(res){
    const st=res.student, exam=res.exam, r=res.result;
    const catCount={}; r.areas.forEach(a=>catCount[a.cat]=(catCount[a.cat]||0)+1);
    const catSeen={}; let areaRows='';
    r.areas.forEach(a=>{ const first=!catSeen[a.cat]; catSeen[a.cat]=true;
      areaRows+=`<tr>${first?`<td class="cat" rowspan="${catCount[a.cat]}">${a.cat}</td>`:''}
        <td class="areaname">${a.name}</td><td>${a.full}</td><td class="hit">${a.score}</td><td>${a.rate}</td></tr>`; });
    function block(s,e){
      let qn='<tr><td class="rowlabel">문항</td>',an='<tr><td class="rowlabel">정답</td>',
          my='<tr><td class="rowlabel">학생답안</td>',ox='<tr><td class="rowlabel">정오</td>';
      for(let q=s;q<=e;q++){ const d=r.detail[q];
        qn+=`<td class="qn">${q}</td>`; an+=`<td>${d.ans}</td>`;
        my+=`<td class="${d.ok?'':'x'}">${d.mine}</td>`; ox+=`<td class="${d.ok?'o':'x'}">${d.ok?d.pt:0}</td>`; }
      return `<table class="scoretbl">${qn}</tr>${an}</tr>${my}</tr>${ox}</tr></table>`;
    }
    const PLOT=160;
    const bars=r.areas.map(a=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px;">${a.rate}</div>
      <div style="width:58%;height:${a.rate/100*PLOT}px;background:var(--bar);border-radius:3px 3px 0 0;"></div></div>`).join('');
    const labels=r.areas.map(a=>`<div style="flex:1;text-align:center;font-size:10.5px;color:var(--ink);line-height:1.2;word-break:keep-all;padding:0 2px;">${a.name}</div>`).join('');
    const chart=`<div style="display:flex;align-items:flex-end;gap:4px;height:${PLOT+20}px;border-bottom:1.5px solid var(--line);padding:0 6px;">${bars}</div>
      <div style="display:flex;gap:4px;padding:7px 6px 0;">${labels}</div>`;

    document.getElementById('report').innerHTML=`
      <div class="back"><button onclick="closeReport()">← 목록으로</button></div>
      <div class="rbrand"><div><div class="name">이수경국어</div><div class="sub">Shueguk</div></div><div class="logo">Shueguk</div></div>
      <div class="tbar">2026 주간 모의고사 성적표 · ${exam.code}</div>
      <section><h2>1. 학생정보</h2>
        <table class="rt info"><tr><th>성명</th><th>학교</th><th>학년</th><th>선택과목</th><th>응시일</th></tr>
        <tr><td>${st.name}</td><td>${st.school}</td><td>${st.grade}</td><td>${exam.subject}</td><td>${fmtDate(st.examDate)}</td></tr></table></section>
      <section><h2>2. 성적</h2>
        <table class="rt score"><tr><th>점수(100점 만점)</th><th>등급</th><th>등급컷</th></tr>
        <tr><td class="big">${r.got}</td><td class="big">${r.grade}</td><td>${exam.cuts.join('-')}</td></tr></table></section>
      <section><h2>3. 영역분류별 성취도 분석</h2>
        <table class="rt areatbl"><tr><th>분류</th><th>영역</th><th>배점</th><th>득점</th><th>성취도(%)</th></tr>
        ${areaRows}
        <tr class="total"><td colspan="2">합계</td><td>${r.total}</td><td>${r.got}</td><td>${Math.round(r.got/r.total*100)}</td></tr></table>
        <div class="chart">${chart}</div></section>
      <section><h2>4. 문항 채점표</h2>
        <div class="grid-wrap">${block(1,15)}${block(16,30)}${block(31,45)}</div>
        <div class="legend">정오 칸의 숫자 = 획득 배점 · 0 = 오답</div></section>`;
    document.getElementById('listView').style.display='none';
    document.getElementById('report').style.display='block';
    window.scrollTo(0,0);
  }
  function closeReport(){
    document.getElementById('report').style.display='none';
    document.getElementById('listView').style.display='block';
    window.scrollTo(0,0);
  }

  reload();  // 시작 시 목록 로드
</script>
</body>
</html>
